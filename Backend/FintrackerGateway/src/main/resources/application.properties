spring.application.name=xpensifyxgateway

spring.main.banner-mode=off

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true


springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

springdoc.swagger-ui.urls[0].name=Personal Expense Service
springdoc.swagger-ui.urls[0].url=/swagger/personalexpense/api/api-docs

springdoc.swagger-ui.urls[1].name=Auth Service
springdoc.swagger-ui.urls[1].url=/swagger/user/api/api-docs

# ---------------------------
# Route 0: Personal Expense API (custom filter)
# ---------------------------
spring.cloud.gateway.server.webflux.routes[0].id=personalexpense-api
spring.cloud.gateway.server.webflux.routes[0].uri=${PERSONAL_SERVICE_URL}
spring.cloud.gateway.server.webflux.routes[0].predicates[0].name=Path
spring.cloud.gateway.server.webflux.routes[0].predicates[0].args.pattern=/personal/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=AuthConfigGatewayFilter

# ---------------------------
# Route 1: User Auth OAuth2
# ---------------------------
spring.cloud.gateway.server.webflux.routes[1].id=userauthservice-oauth
spring.cloud.gateway.server.webflux.routes[1].uri=${USER_AUTH_SERVICE}
spring.cloud.gateway.server.webflux.routes[1].predicates[0].name=Path
spring.cloud.gateway.server.webflux.routes[1].predicates[0].args.pattern=/oauth2/**
spring.cloud.gateway.server.webflux.routes[1].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[1].filters[0].args.name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[1].filters[0].args.fallbackUri=forward:/fallback

# ---------------------------
# Route 2: User Auth API
# ---------------------------
spring.cloud.gateway.server.webflux.routes[2].id=userauthservice-api
spring.cloud.gateway.server.webflux.routes[2].uri=${USER_AUTH_SERVICE}
spring.cloud.gateway.server.webflux.routes[2].predicates[0].name=Path
spring.cloud.gateway.server.webflux.routes[2].predicates[0].args.pattern=/userauth/api/**
spring.cloud.gateway.server.webflux.routes[2].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[2].filters[0].args.name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[2].filters[0].args.fallbackUri=forward:/fallback

# ---------------------------
# Route 3: User Auth Swagger UI (assets + UI)
# ---------------------------
spring.cloud.gateway.server.webflux.routes[3].id=userauthservice-swagger
spring.cloud.gateway.server.webflux.routes[3].uri=${USER_AUTH_SERVICE}
spring.cloud.gateway.server.webflux.routes[3].predicates[0].name=Path
spring.cloud.gateway.server.webflux.routes[3].predicates[0].args.pattern=/swagger/user/api/**
spring.cloud.gateway.server.webflux.routes[3].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[3].filters[0].args.name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[3].filters[0].args.fallbackUri=forward:/fallback
spring.cloud.gateway.server.webflux.routes[3].filters[1]=StripPrefix=1

# ---------------------------
# Route 4: User Auth OpenAPI Swagger UI Assets (redirect target)
# ---------------------------
spring.cloud.gateway.server.webflux.routes[4].id=userauthservice-assets
spring.cloud.gateway.server.webflux.routes[4].uri=${USER_AUTH_SERVICE}
spring.cloud.gateway.server.webflux.routes[4].predicates[0].name=Path
spring.cloud.gateway.server.webflux.routes[4].predicates[0].args.pattern=/user/api/swagger-ui/**
spring.cloud.gateway.server.webflux.routes[4].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[4].filters[0].args.name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[4].filters[0].args.fallbackUri=forward:/fallback


# ---------------------------
# Route 6 : USer auth OpenApi Direct Path
# ---------------------------

spring.cloud.gateway.server.webflux.routes[10].id=userauthservice-openapi-direct
spring.cloud.gateway.server.webflux.routes[10].uri=${USER_AUTH_SERVICE}
spring.cloud.gateway.server.webflux.routes[10].predicates[0].name=Path
spring.cloud.gateway.server.webflux.routes[10].predicates[0].args.pattern=/user/api/api-docs/**
spring.cloud.gateway.server.webflux.routes[10].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[10].filters[0].args.name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[10].filters[0].args.fallbackUri=forward:/fallback

# Route 5: User Auth Actuator
# ---------------------------
spring.cloud.gateway.server.webflux.routes[5].id=userauthservice-actuator
spring.cloud.gateway.server.webflux.routes[5].uri=${USER_AUTH_SERVICE}
spring.cloud.gateway.server.webflux.routes[5].predicates[0].name=Path
spring.cloud.gateway.server.webflux.routes[5].predicates[0].args.pattern=/userauth/actuator/**
spring.cloud.gateway.server.webflux.routes[5].filters[0]=StripPrefix=1

# ---------------------------
# Route 6: Personal Service Actuator
# ---------------------------
spring.cloud.gateway.server.webflux.routes[6].id=personalservice-actuator
spring.cloud.gateway.server.webflux.routes[6].uri=${PERSONAL_SERVICE_URL}
spring.cloud.gateway.server.webflux.routes[6].predicates[0].name=Path
spring.cloud.gateway.server.webflux.routes[6].predicates[0].args.pattern=/personalservice/actuator/**
spring.cloud.gateway.server.webflux.routes[6].filters[0]=StripPrefix=1

# ---------------------------
# Route 7: Personal Service OpenAPI exposed under /swagger/...
# ---------------------------
spring.cloud.gateway.server.webflux.routes[7].id=personalservice-swagger
spring.cloud.gateway.server.webflux.routes[7].uri=${PERSONAL_SERVICE_URL}
spring.cloud.gateway.server.webflux.routes[7].predicates[0].name=Path
spring.cloud.gateway.server.webflux.routes[7].predicates[0].args.pattern=/swagger/personalexpense/api/**
spring.cloud.gateway.server.webflux.routes[7].filters[0]=StripPrefix=1

# ---------------------------
# Route 8: Personal Service Swagger UI assets (redirect target)
# ---------------------------
spring.cloud.gateway.server.webflux.routes[8].id=personalservice-swagger-assets
spring.cloud.gateway.server.webflux.routes[8].uri=${PERSONAL_SERVICE_URL}
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/personalexpense/api/swagger-ui/**

# ---------------------------
# Route 9: Personal Service OpenAPI direct path (swagger-config, etc.)
# ---------------------------
spring.cloud.gateway.server.webflux.routes[9].id=personalservice-openapi-direct
spring.cloud.gateway.server.webflux.routes[9].uri=${PERSONAL_SERVICE_URL}
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/personalexpense/api/api-docs/**


domain=${DOMAIN}

validationUrl=${VALIDATION_URL}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}

otel.exporter.otlp.endpoint=http://jaeger:4317
otel.exporter.otlp.protocol=grpc
otel.traces.sampler=always_on
otel.propagators=tracecontext,baggage