server.port=8083

spring.main.banner-mode=off
logging.level.org.vrajpatel.personalexpense=debug

#eureka.client.enabled = false

#eureka.client.service-url.defaultZone=http://localhost:8082/eureka
#eureka.client.register-with-eureka=true
#eureka.client.fetch-registry=true

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.datasource.url=jdbc:postgresql://localhost:5432/fintracker
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.show-sql= true
spring.data.jdbc.dialect=postgresql
spring.jpa.hibernate.ddl-auto=update

#eureka.instance.hostname=localhost

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}

springdoc.api-docs.path=/personalexpense/api/api-docs
springdoc.swagger-ui.path=/personalexpense/api/swagger-ui-custom.html

