spring.application.name=userauthservice


spring.main.banner-mode=off

logging.level.org.vrajpatel.userauthservice=debug

logging.level.root=error

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}

app.auth.access-token-secret=04ca023b39512e46d0c2cf4b48d5aac61d34302994c87ed4eff225dcf3b0a218739f3897051a057f9b846a69ea2927a587044164b7bae5e1306219d50b588cb1
app.auth.access-token-expiration-msec=300000

app.auth.refresh-token-secret=913b81c967484371b627eb50711352eaa33ca042478dcb155f20ad093855d09e
app.auth.refresh-token-expiration-msec=864000000

springdoc.api-docs.path=/user/api/api-docs
springdoc.swagger-ui.path=/user/api/swagger-ui-custom.html

otel.exporter.otlp.endpoint=http://jaeger:4317
otel.exporter.otlp.protocol=grpc
otel.traces.sampler=always_on
otel.propagators=tracecontext,baggage


