spring.application.name=userauthservice

spring.main.banner-mode=off

logging.level.org.vrajpatel.userauthservice=debug

logging.level.root=error


management.metrics.tags.application=${spring.application.name}

app.auth.access-token-secret=${ACCESS_TOKEN_SECRET}
app.auth.access-token-expiration-msec=300000

app.auth.refresh-token-secret=${REFRESH_TOKEN_SECRET}
app.auth.refresh-token-expiration-msec=864000000

springdoc.api-docs.path=/user/api/api-docs
springdoc.swagger-ui.path=/user/api/swagger-ui-custom.html




