app.auth.access-token-secret=test-access-secret-key-for-testing-purposes-only-not-for-prod
app.auth.access-token-expiration-msec=300000
app.auth.refresh-token-secret=test-refresh-secret-key-for-testing-purposes-only-not-for-prod
app.auth.refresh-token-expiration-msec=864000000

# Suppress most framework noise
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.testcontainers=WARN
logging.level.com.zaxxer.hikari=WARN

# Keep your own app logs visible
logging.level.org.vrajpatel=WARN

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.mail.host=localhost
spring.mail.port=25

spring.security.oauth2.client.registration.google.client-id=test-google-id
spring.security.oauth2.client.registration.google.client-secret=test-google-secret
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost/oauth2/callback/google

spring.security.oauth2.client.registration.github.client-id=test-github-id
spring.security.oauth2.client.registration.github.client-secret=test-github-secret
spring.security.oauth2.client.registration.github.redirect-uri=http://localhost/oauth2/callback/github
spring.security.oauth2.client.registration.github.scope=user:email,read:user

spring.security.oauth2.client.registration.facebook.client-id=test-fb-id
spring.security.oauth2.client.registration.facebook.client-secret=test-fb-secret
spring.security.oauth2.client.registration.facebook.redirect-uri=http://localhost/oauth2/callback/facebook
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.provider.facebook.authorizationUri=https://www.facebook.com/v16.0/dialog/oauth
spring.security.oauth2.client.provider.facebook.tokenUri=https://graph.facebook.com/v16.0/oauth/access_token
spring.security.oauth2.client.provider.facebook.userInfoUri=https://graph.facebook.com/v3.0/me?fields=id,email,name

app.oauth2.authorized-redirect-uris=http://localhost:3000/oauth2/redirects

authorizedUrl=http://localhost:3000
domain=localhost
eureka.client.enabled=false

otel.sdk.disabled=true
management.endpoints.web.exposure.include=health
management.health.mail.enabled=false
